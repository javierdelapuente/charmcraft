summary: test charmcraft init with flask-framework profile

execute: |
  unset CHARMCRAFT_STORE_API_URL
  unset CHARMCRAFT_UPLOAD_URL
  unset CHARMCRAFT_REGISTRY_URL

  mkdir -p test-init
  cd test-init
  charmcraft init --profile flask-framework
  cat <<- EOF >> charmcraft.yaml
  charmhub:
    api-url: https://api.staging.charmhub.io
    storage-url: https://storage.staging.snapcraftcontent.com
  EOF

  charmcraft fetch-libs
  charmcraft pack --verbose
  test -f *.charm

restore: |
  pushd test-init
  charmcraft clean
  popd

  rm -rf test-init
